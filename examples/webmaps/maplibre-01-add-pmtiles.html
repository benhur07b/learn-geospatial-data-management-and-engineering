<!DOCTYPE html>
<!--
  MAP 01 — LOADING PMTiles LAYERS
  ================================
  In this first step, we will:
    1. Set up a basic web map using MapLibre GL JS
    2. Load two PMTiles files (ADM3 and ADM4) as vector layers
    3. Display them on the map with simple, fixed colors
    4. Add a panel with checkboxes to toggle each layer on/off

  What is MapLibre GL JS?
  -----------------------
  MapLibre GL JS is a JavaScript library for displaying interactive maps
  in a web browser. It renders maps using WebGL (your graphics card),
  which makes it very fast even with large datasets.

  What is PMTiles?
  ----------------
  PMTiles is a single-file format for storing map tiles. Instead of a
  server that responds to tile requests, a PMTiles file can be hosted
  on any static file server (like MinIO) and the browser fetches only
  the tiles it needs using HTTP range requests.

  What are vector tiles?
  ----------------------
  Unlike raster tiles (images), vector tiles contain the raw geometry
  and attribute data (points, lines, polygons + properties). The browser
  draws them — meaning you can style them however you like with code.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Step 1 — Loading PMTiles Layers</title>

  <!--
    LIBRARIES
    ---------
    We load two external libraries from unpkg.com (a CDN — Content Delivery
    Network — that hosts JavaScript packages so we don't have to install them).

    1. maplibre-gl  — the mapping library (JS + CSS)
    2. pmtiles      — adds PMTiles support to MapLibre
  -->
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link  href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>

  <style>
    /*
      CSS — BASIC PAGE LAYOUT
      -----------------------
      We want the map to fill the entire browser window.
      The * selector resets default browser spacing on all elements.
      Setting width/height to 100% on html, body, and #map makes the
      map div expand to fill the whole page.
    */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { width: 100%; height: 100%; }

    /* The panel is positioned on top of the map in the top-left corner. */
    #panel {
      position: absolute;   /* taken out of normal page flow */
      top: 10px;
      left: 10px;
      background: white;
      border-radius: 6px;
      padding: 12px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      font-family: sans-serif;
      font-size: 13px;
      z-index: 1;           /* sit above the map canvas */
      width: 220px;
    }

    .panel-section { margin-bottom: 12px; }
    .panel-section:last-child { margin-bottom: 0; }

    .panel-section h4 {
      margin: 0 0 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
    }

    /* Each layer row: checkbox + color swatch + label side by side */
    .layer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .layer-item:last-child { margin-bottom: 0; }
    .layer-item label { cursor: pointer; user-select: none; }

    /* Small colored square that previews the layer color */
    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    input[type="checkbox"] { cursor: pointer; }
  </style>
</head>
<body>

  <!--
    HTML STRUCTURE
    --------------
    We only need two elements:
      1. #map  — the div where MapLibre will draw the map
      2. #panel — the control panel floating on top of the map
  -->
  <div id="map"></div>

  <div id="panel">
    <!--
      The layer list is empty on page load.
      JavaScript will add a checkbox row for each layer once the
      PMTiles metadata has been read.
    -->
    <div class="panel-section" id="layer-section">
      <h4>Layers</h4>
    </div>
  </div>

  <script>
    // =========================================================================
    // STEP 1 — DEFINE OUR DATA SOURCES
    // =========================================================================
    //
    // We define an array of source objects. Each source has:
    //   id    — a unique name we'll use to refer to it inside MapLibre
    //   url   — where the PMTiles file lives (our MinIO server)
    //   label — the human-readable name shown in the layer panel
    //   color — a simple fixed color for this layer in step 1
    //
    const SOURCES = [
      {
        id:    "phl-adm3",
        url:   "http://localhost:9000/psa-afcd/pmtiles/phl_adm3.pmtiles",
        label: "ADM3 (Municipality)",
        color: "#377eb8",   // blue
      },
      {
        id:    "phl-adm4",
        url:   "http://localhost:9000/psa-afcd/pmtiles/phl_adm4.pmtiles",
        label: "ADM4 (Barangay)",
        color: "#e41a1c",   // red
      },
    ];


    // =========================================================================
    // STEP 2 — REGISTER THE PMTiles PROTOCOL
    // =========================================================================
    //
    // By default MapLibre doesn't know how to fetch PMTiles files.
    // We register a custom "pmtiles://" URL protocol so that when MapLibre
    // sees a source URL starting with "pmtiles://", it uses the PMTiles
    // library to fetch just the tiles it needs from the file.
    //
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);


    // =========================================================================
    // STEP 3 — CREATE THE MAP
    // =========================================================================
    //
    // maplibregl.Map() initialises the map inside the #map div.
    // The "style" object is the heart of a MapLibre map — it describes:
    //   - sources: where the data comes from
    //   - layers:  how the data is drawn
    //
    const map = new maplibregl.Map({
      container: "map",   // the id of the HTML div to render into

      style: {
        version: 8,

        // glyphs is required for any text labels (even if we're not using them
        // right now, MapLibre needs the field to be present).
        glyphs: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",

        sources: {
          // ── Basemap (raster tiles from OpenStreetMap) ─────────────────────
          // Raster tiles are pre-rendered PNG/JPG images. We use OSM as a
          // simple, free background reference layer.
          "basemap": {
            type: "raster",
            tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
            tileSize: 256,
            attribution: "&copy; OpenStreetMap contributors"
          },

          // ── PMTiles vector sources ─────────────────────────────────────────
          // We spread the SOURCES array into the sources object so that
          // each source gets its own entry.
          // Object.fromEntries() turns an array of [key, value] pairs into
          // a plain object. The result looks like:
          //   { "phl-adm3": { type: "vector", url: "pmtiles://..." },
          //     "phl-adm4": { type: "vector", url: "pmtiles://..." } }
          ...Object.fromEntries(
            SOURCES.map(s => [
              s.id,
              { type: "vector", url: `pmtiles://${s.url}` }
            ])
          )
        },

        // We only add the basemap layer here. The vector layers are added
        // later (after we've read the PMTiles metadata to get the layer name).
        layers: [
          {
            id:     "basemap",
            type:   "raster",
            source: "basemap"
          }
        ]
      },

      center: [122, 12],   // longitude, latitude — roughly the center of Philippines
      zoom: 5
    });

    // Add zoom and rotation controls in the top-right corner.
    map.addControl(new maplibregl.NavigationControl(), "top-right");


    // =========================================================================
    // STEP 4 — LAYER VISIBILITY TOGGLE
    // =========================================================================
    //
    // This function shows or hides a layer by setting the "visibility" layout
    // property. MapLibre uses "visible" / "none" as the two possible values.
    // Each data layer is split into two map layers: a fill (polygon) and a
    // line (border), so we update both together.
    //
    function toggleLayer(layerId, visible) {
      const v = visible ? "visible" : "none";
      map.setLayoutProperty(`${layerId}-fill`, "visibility", v);
      map.setLayoutProperty(`${layerId}-line`, "visibility", v);
    }

    //
    // This function builds the layer panel UI dynamically.
    // For each layer definition we create a checkbox + swatch + label row
    // and append it to the #layer-section div.
    //
    function buildLayerSelector(layers) {
      const section = document.getElementById("layer-section");

      layers.forEach(({ id, label, color }) => {
        // Create the row container
        const item = document.createElement("div");
        item.className = "layer-item";

        // Checkbox — triggers toggleLayer when clicked
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = `toggle-${id}`;
        checkbox.checked = true;   // layers are visible by default
        checkbox.addEventListener("change", () => toggleLayer(id, checkbox.checked));

        // Colored square matching the layer color
        const swatch = document.createElement("span");
        swatch.className = "swatch";
        swatch.style.background = color;

        // Text label
        const labelEl = document.createElement("label");
        labelEl.htmlFor = `toggle-${id}`;
        labelEl.textContent = label;

        item.append(checkbox, swatch, labelEl);
        section.appendChild(item);
      });
    }


    // =========================================================================
    // STEP 5 — ADD VECTOR LAYERS AFTER THE MAP LOADS
    // =========================================================================
    //
    // We listen for the "load" event, which fires once the map style and base
    // tiles have finished loading. At this point it's safe to add new layers.
    //
    // We also read the PMTiles metadata to find out the name of the vector
    // layer inside each file ("source-layer"). PMTiles files can contain
    // multiple named layers — we use the first one.
    //
    // We store layer definitions in an array so other functions can reference
    // them without hard-coding names.
    //
    let layerDefs = [];   // will hold { mapLayerId, source, sourceLayer, label, color }

    map.on("load", async () => {

      // Process both sources in parallel with Promise.all for speed.
      await Promise.all(SOURCES.map(async (src) => {

        // Open the PMTiles file and read its header + metadata.
        const p = new pmtiles.PMTiles(src.url);
        const [header, metadata] = await Promise.all([
          p.getHeader(),
          p.getMetadata()
        ]);

        // The metadata contains a "vector_layers" array listing all layers
        // inside the file. We take the first one.
        const sourceLayer = (metadata?.vector_layers ?? [])[0]?.id
                            ?? src.id.replace("phl-", "phl_");  // fallback

        const mapLayerId = sourceLayer;
        layerDefs.push({ mapLayerId, source: src.id, sourceLayer, label: src.label, color: src.color });

        // ── Fill layer ───────────────────────────────────────────────────────
        // A "fill" layer draws the polygon interiors.
        // "source-layer" must match the layer name inside the PMTiles file.
        map.addLayer({
          id:            `${mapLayerId}-fill`,
          type:          "fill",
          source:        src.id,
          "source-layer": sourceLayer,
          paint: {
            "fill-color":   src.color,
            "fill-opacity": 0.3      // semi-transparent so basemap shows through
          }
        });

        // ── Line layer ───────────────────────────────────────────────────────
        // A "line" layer draws the polygon outlines (borders).
        // We add this on top of the fill so borders are crisp.
        map.addLayer({
          id:            `${mapLayerId}-line`,
          type:          "line",
          source:        src.id,
          "source-layer": sourceLayer,
          paint: {
            "line-color": src.color,
            "line-width": 0.8
          }
        });

        // Fit the map view to the data extent using the bounding box from
        // the PMTiles header. We do this for the ADM3 file only (both files
        // cover the same area, no need to do it twice).
        if (src.id === "phl-adm3" && header.minLon !== undefined) {
          map.fitBounds(
            [[header.minLon, header.minLat], [header.maxLon, header.maxLat]],
            { padding: 20 }
          );
        }
      }));

      // Build the layer toggle panel now that we know all layer definitions.
      buildLayerSelector(layerDefs.map(d => ({ id: d.mapLayerId, label: d.label, color: d.color })));
    });

  </script>
</body>
</html>
